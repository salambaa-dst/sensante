<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SénSanté - Diagnostic Médical</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3a5f 0%, #2d6a4f 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            padding: 30px 0 20px;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        header p {
            font-size: 1rem;
            opacity: 0.85;
            margin-top: 6px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }

        .card h2 {
            font-size: 1.1rem;
            color: #1e3a5f;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e8f4f8;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full {
            grid-column: 1 / -1;
        }

        label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 5px;
        }

        input, select {
            padding: 10px 12px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: border-color 0.2s;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #2d6a4f;
        }

        .symptomes-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 5px;
        }

        .symptome-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border: 1.5px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .symptome-item:hover {
            border-color: #2d6a4f;
            background: #f0faf5;
        }

        .symptome-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            padding: 0;
            border: none;
        }

        .symptome-item label {
            margin: 0;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1e3a5f, #2d6a4f);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn-submit:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #resultat {
            display: none;
        }

        .diagnostic-box {
            text-align: center;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .diagnostic-box.paludisme { background: #fff3cd; border: 2px solid #ffc107; }
        .diagnostic-box.grippe    { background: #d1ecf1; border: 2px solid #17a2b8; }
        .diagnostic-box.typhoide  { background: #f8d7da; border: 2px solid #dc3545; }
        .diagnostic-box.sain      { background: #d4edda; border: 2px solid #28a745; }

        .diagnostic-nom {
            font-size: 1.8rem;
            font-weight: 700;
            text-transform: capitalize;
            color: #1e3a5f;
        }

        .diagnostic-proba {
            font-size: 1rem;
            color: #555;
            margin-top: 4px;
        }

        .progress-bar-container {
            background: #e9ecef;
            border-radius: 20px;
            height: 12px;
            margin: 10px 0;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            border-radius: 20px;
            background: linear-gradient(90deg, #2d6a4f, #52b788);
            transition: width 0.8s ease;
        }

        .autres-probas {
            margin-top: 15px;
        }

        .proba-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            font-size: 0.9rem;
            color: #555;
            border-bottom: 1px solid #f0f0f0;
        }

        .proba-item:last-child { border-bottom: none; }

        #explication-llm {
            margin-top: 15px;
            padding: 15px;
            background: #f3e8ff;
            border-left: 4px solid #7c3aed;
            border-radius: 8px;
            color: #4c1d95;
            line-height: 1.6;
            font-size: 0.95rem;
            display: none;
        }

        .btn-nouveau {
            width: 100%;
            padding: 12px;
            background: white;
            color: #1e3a5f;
            border: 2px solid #1e3a5f;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.2s;
        }

        .btn-nouveau:hover {
            background: #1e3a5f;
            color: white;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #555;
            font-style: italic;
        }

        footer {
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-size: 0.8rem;
            padding: 20px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🏥 SénSanté</h1>
        <p>Aide au diagnostic médical — Sénégal</p>
    </header>

    <!-- Formulaire -->
    <div class="card" id="formulaire">
        <h2>📋 Informations du Patient</h2>
        <div class="form-grid">

            <div class="form-group">
                <label for="age">Âge</label>
                <input type="number" id="age" min="1" max="120" placeholder="Ex: 28" required>
            </div>

            <div class="form-group">
                <label for="sexe">Sexe</label>
                <select id="sexe">
                    <option value="F">Femme</option>
                    <option value="M">Homme</option>
                </select>
            </div>

            <div class="form-group">
                <label for="temperature">Température (°C)</label>
                <input type="number" id="temperature" step="0.1" min="35" max="42" placeholder="Ex: 39.5" required>
            </div>

            <div class="form-group">
                <label for="tension">Tension systolique (mmHg)</label>
                <input type="number" id="tension" min="70" max="200" placeholder="Ex: 120" required>
            </div>

            <div class="form-group full">
                <label for="region">Région</label>
                <select id="region">
                    <option value="Dakar">Dakar</option>
                    <option value="Thies">Thiès</option>
                    <option value="Saint-Louis">Saint-Louis</option>
                    <option value="Ziguinchor">Ziguinchor</option>
                    <option value="Autre">Autre</option>
                </select>
            </div>

            <div class="form-group full">
                <label>Symptômes</label>
                <div class="symptomes-grid">
                    <div class="symptome-item">
                        <input type="checkbox" id="toux">
                        <label for="toux">🤧 Toux</label>
                    </div>
                    <div class="symptome-item">
                        <input type="checkbox" id="fatigue">
                        <label for="fatigue">😴 Fatigue</label>
                    </div>
                    <div class="symptome-item">
                        <input type="checkbox" id="maux_tete">
                        <label for="maux_tete">🤕 Maux de tête</label>
                    </div>
                </div>
            </div>

        </div>

        <button class="btn-submit" onclick="lancerDiagnostic()">
            🔍 Lancer le Diagnostic
        </button>
    </div>

    <!-- Résultat -->
    <div class="card" id="resultat">
        <h2>📊 Résultat du Diagnostic</h2>

        <div id="contenu-resultat"></div>

        <div id="explication-llm"></div>

        <button class="btn-nouveau" onclick="nouveauDiagnostic()">
            🔄 Nouveau Diagnostic
        </button>
    </div>

    <footer>SénSanté v4.0 — Aide à la décision uniquement</footer>
</div>

<script>
    // APRÈS (Lab 6) :
const API_URL = "";

    async function lancerDiagnostic() {
        const age         = parseInt(document.getElementById("age").value);
        const sexe        = document.getElementById("sexe").value;
        const temperature = parseFloat(document.getElementById("temperature").value);
        const tension     = parseInt(document.getElementById("tension").value);
        const region      = document.getElementById("region").value;
        const toux        = document.getElementById("toux").checked ? 1 : 0;
        const fatigue     = document.getElementById("fatigue").checked ? 1 : 0;
        const maux_tete   = document.getElementById("maux_tete").checked ? 1 : 0;
    



        if (!age || !temperature || !tension) {
            alert("Veuillez remplir tous les champs obligatoires.");
            return;
        }

        const btn = document.querySelector(".btn-submit");
        btn.disabled = true;
        btn.textContent = "Analyse en cours...";

        try {
            const response = await fetch(`${API_URL}/predict`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    age, sexe, temperature, tension,
                    toux, fatigue, maux_tete, region
                })
            });

            const data = await response.json();
            afficherResultat(data, age, sexe, temperature, region);

        } catch (error) {
            alert("Erreur : impossible de contacter l'API. Vérifiez que le serveur tourne.");
        } finally {
            btn.disabled = false;
            btn.textContent = "🔍 Lancer le Diagnostic";
        }
    }

    function afficherResultat(data, age, sexe, temperature, region) {
        document.getElementById("formulaire").style.display = "none";
        document.getElementById("resultat").style.display = "block";

        const proba = Math.round(data.probabilite * 100);

        let autresHtml = "";
        data.classes.forEach((cls, i) => {
            if (cls !== data.diagnostic) {
                autresHtml += `
                    <div class="proba-item">
                        <span>${cls}</span>
                        <span>${Math.round(data.probabilites[i] * 100)}%</span>
                    </div>`;
            }
        });

        document.getElementById("contenu-resultat").innerHTML = `
            <div class="diagnostic-box ${data.diagnostic}">
                <div class="diagnostic-nom">${data.diagnostic}</div>
                <div class="diagnostic-proba">Probabilité : ${proba}%</div>
                <div class="progress-bar-container">
                    <div class="progress-bar" style="width: ${proba}%"></div>
                </div>
            </div>
            <div class="autres-probas">
                <strong style="font-size:0.9rem; color:#555;">Autres probabilités :</strong>
                ${autresHtml}
            </div>
        `;

        // Afficher la zone LLM et demander l'explication
        const zoneExplication = document.getElementById("explication-llm");
        zoneExplication.style.display = "block";
        zoneExplication.innerHTML = "<em>💬 Génération de l'explication en cours...</em>";

        demanderExplication(data.diagnostic, data.probabilite, age, sexe, temperature, region);
    }

    async function demanderExplication(diagnostic, probabilite, age, sexe, temperature, region) {
        const zone = document.getElementById("explication-llm");

        try {
            const response = await fetch(`${API_URL}/explain`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    diagnostic, probabilite, age, sexe, temperature, region
                })
            });
            const data = await response.json();
            zone.innerHTML = `<strong>💬 Explication :</strong><br><br>${data.explication}`;
        } catch (error) {
            zone.innerHTML = "Service d'explication indisponible.";
        }
    }

    function nouveauDiagnostic() {
        document.getElementById("formulaire").style.display = "block";
        document.getElementById("resultat").style.display = "none";
        document.getElementById("explication-llm").style.display = "none";
        document.getElementById("explication-llm").innerHTML = "";
    }
</script>

</body>
</html>
